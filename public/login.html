<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  
  <div class="left">
    <div class="left-logo">
      <h1>Sospitas</h1>
    </div>


  <!-- RIGHT: Form -->
  <div class="right">
    <div class="form-card">

      <div class="form-header">
        <h3>Welcome back</h3>
        <p>Sign in to access the hospital dashboard</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="error-msg"></div>

      <!-- Register-only fields -->
      <div id="register-fields">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Jane Smith"/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reg-role">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <!-- Shared fields -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="input-email" placeholder="you@hospital.nhs.uk"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="input-password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">
        Sign In
      </button>

      <div class="form-footer">
        Authorised personnel only.<br/>
        All access is logged and monitored.
      </div>

    </div>
  </div>

  <script>
    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('register-fields').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('submit-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
      document.querySelector('.form-header h3').textContent = tab === 'login' ? 'Welcome back' : 'Create account';
      document.querySelector('.form-header p').textContent = tab === 'login'
        ? 'Sign in to access the hospital dashboard'
        : 'Register for staff access';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    function setLoading(loading) {
      const btn = document.getElementById('submit-btn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>' + (currentTab === 'login' ? 'Signing in...' : 'Creating...');
      } else {
        btn.disabled = false;
        btn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
      }
    }

    async function handleSubmit() {
      hideError();
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;

      if (!email || !password) return showError('Please fill in all fields');

      setLoading(true);

      try {
        if (currentTab === 'login') {
          await login(email, password);
        } else {
          const name = document.getElementById('reg-name').value.trim();
          const role = document.getElementById('reg-role').value;
          if (!name) { setLoading(false); return showError('Please enter your name'); }
          await register(name, email, password, role);
        }
      } catch (err) {
        showError(err.message || 'Something went wrong');
        setLoading(false);
      }
    }

    async function login(email, password) {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      saveAndRedirect(data);
    }

    async function register(name, email, password, role) {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      saveAndRedirect(data);
    }

    function saveAndRedirect(data) {
      // Store token and user info for the dashboard to use
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/index.html';
    }

    // If already logged in, skip to dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/index.html';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

</body>
</html>
